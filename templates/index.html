<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confissões – Arquidiocese de Londrina</title>

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<script>
function filtrar() {
    const termo = document.getElementById("busca").value.toLowerCase();
    const dias = document.querySelectorAll("details");

    dias.forEach(dia => {
        const cards = dia.querySelectorAll(".card");
        let encontrou = false;

        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();

            if (texto.includes(termo)) {
                card.style.display = "block";
                encontrou = true;
            } else {
                card.style.display = "none";
            }
        });

        // Caso 1: campo de busca está vazio → mostrar tudo recolhido
        if (termo === "") {
            dia.style.display = "block";
            dia.open = false;   // recolhe tudo
            cards.forEach(card => card.style.display = "block"); // restaura todos os cards
            return;
        }

        // Caso 2: busca ativa → mostrar só dias com resultados e expandir
        if (encontrou) {
            dia.style.display = "block";
            dia.open = true;    // expande automaticamente
        } else {
            dia.style.display = "none"; // esconde dias sem resultados
            dia.open = false;
        }
    });
}
</script>



<body>

<header>
    Confissões – Arquidiocese de Londrina
</header>
<div class="busca-container">
    <input type="text" id="busca" placeholder="Buscar paróquia..." onkeyup="filtrar()">
</div>

<main>
    {% for dia, lista in dias.items() %}
    <details class="dia-bloco">
        <summary class="dia-titulo">{{ dia }}</summary>

        <ul class="lista-paroquias">
            {% for item in lista %}
            <li class="card">
                <strong>{{ item.paroquia }}</strong><br>
                <span>{{ item.local }}</span><br>
                <span>Horário: {{ item.horario }}</span>
            </li>
            {% endfor %}
        </ul>
    </details>
    {% endfor %}
</main>
</body>
</html>
